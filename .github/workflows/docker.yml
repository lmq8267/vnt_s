name: 打包docker镜像

on:
  workflow_dispatch:
    inputs:
      tag:
        description: '请填写打包镜像的版本号'
        required: true
        default: ''
      latest:
        description: '是否打包成最新latest镜像'
        required: true
        default: true
        type: boolean

env:
  tags: "${{ github.event.inputs.tag }}"

permissions:
  contents: write
  packages: write  # 允许写入 GitHub Container Registry (GHCR)
jobs:
 build:
    runs-on: ubuntu-latest
    steps:
      - name: 下载二进制文件
        run: |
          mkdir -p /opt/vnt
          cd /opt/vnt
          wget -c -O /opt/vnt/vnts_amd64 https://github.com/lmq8267/vnt_s/releases/download/${{ env.tags }}/vnts-x86_64-unknown-linux-musl
          chmod a+x vnts_amd64

          wget -c -O /opt/vnt/vnts_386 https://github.com/lmq8267/vnt_s/releases/download/${{ env.tags }}/vnts-i686-unknown-linux-musl
          chmod a+x vnts_386

          wget -c -O /opt/vnt/vnts_arm64 https://github.com/lmq8267/vnt_s/releases/download/${{ env.tags }}/vnts-aarch64-unknown-linux-musl
          chmod a+x vnts_arm64
          
          wget -c -O /opt/vnt/vnts_armv7 https://github.com/lmq8267/vnt_s/releases/download/${{ env.tags }}/vnts-armv7-unknown-linux-musleabi
          chmod a+x vnts_armv7

          wget -c -O /opt/vnt/vnts_armv6 https://github.com/lmq8267/vnt_s/releases/download/${{ env.tags }}/vnts-arm-unknown-linux-musleabi
          chmod a+x vnts_armv6
          
      - name: Setup QEMU
        uses: dbhi/qus/action@main
      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
         username: ${{ github.repository_owner }}
         password: ${{ secrets.DOCKER_TOKEN }}
      - name: login github container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: 构建发布
        run: |
         git clone https://github.com/lmq8267/vnts /opt/src
         mv /opt/src/Dockerfile /opt/vnt/Dockerfile
      - name: Build and Push Docker Latest Image
        if: github.event.inputs.latest == 'true'
        uses: docker/build-push-action@v5
        with:
         push: true
         tags: |
          docker.io/${{ github.repository_owner }}/vnts:${{ env.tags }}
          docker.io/${{ github.repository_owner }}/vnts:latest
          ghcr.io/${{ github.repository_owner }}/vnt_s:${{ env.tags }}
          ghcr.io/${{ github.repository_owner }}/vnt_s:latest
         platforms: linux/amd64,linux/386,linux/arm64,linux/arm/v7,linux/arm/v6
         context: /opt/vnt
      - name: Build and Push Docker Image
        if: github.event.inputs.latest == 'false'
        uses: docker/build-push-action@v5
        with:
         push: true
         tags: |
          docker.io/${{ github.repository_owner }}/vnts:${{ env.tags }}
          ghcr.io/${{ github.repository_owner }}/vnt_s:${{ env.tags }}
         platforms: linux/amd64,linux/386,linux/arm64,linux/arm/v7,linux/arm/v6
         context: /opt/vnt
      - name: Save Docker Image
        run: |
          mkdir -p /opt/dk
          docker pull --platform linux/amd64 lmq8267/vnts:${{ env.tags }}
          docker save -o /opt/dk/vnts-x86_64-docker-${{ env.tags }}.tar lmq8267/vnts:${{ env.tags }}

          docker pull --platform linux/386 lmq8267/vnts:${{ env.tags }}
          docker save -o /opt/dk/vnts-i386-docker-${{ env.tags }}.tar lmq8267/vnts:${{ env.tags }}

          docker pull --platform linux/arm64 lmq8267/vnts:${{ env.tags }}
          docker save -o /opt/dk/vnts-arm64-docker-${{ env.tags }}.tar lmq8267/vnts:${{ env.tags }}

          docker pull --platform linux/arm/v7 lmq8267/vnts:${{ env.tags }}
          docker save -o /opt/dk/vnts-armv7-docker-${{ env.tags }}.tar lmq8267/vnts:${{ env.tags }}

          docker pull --platform linux/arm/v6 lmq8267/vnts:${{ env.tags }}
          docker save -o /opt/dk/vnts-armv6-docker-${{ env.tags }}.tar lmq8267/vnts:${{ env.tags }}
          echo "build_time=$(TZ=UTC-8 date '+%Y年%m月%d日%H:%M:%S' | jq -sRr @uri)" >> $GITHUB_ENV

      - name: 发布docker镜像到Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: /opt/dk/*.tar
          tag: ${{ env.tags }}
          overwrite: true
          file_glob: true
